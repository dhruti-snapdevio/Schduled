# This file runs Postgres for you (good default — nothing else to set up).
# Already have a Postgres database (managed service or your own instance)?
# Use docker-compose.external-db.yml instead:
#   docker compose -f docker-compose.external-db.yml up -d

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-schduled}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-schduled}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-schduled}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      # Only used when STORAGE_DRIVER=local (the default). Not needed if
      # you've set STORAGE_DRIVER=s3/r2 — see ENVIRONMENT.md §7.
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  # Pinned to literal names (not just "postgres-data"/"uploads") on purpose:
  # Compose namespaces unnamed volumes as "<compose-project-name>_<volume-name>",
  # and some deploy tools (observed with Dokploy) don't keep the project name
  # stable across redeploys — that silently creates a NEW, empty volume each
  # time, orphaning the old one (DB data or uploads) without any error.
  # Pinning guarantees every deploy reattaches to the same volume.
  postgres-data:
    name: schduled_postgres_data
  uploads:
    name: schduled_uploads
